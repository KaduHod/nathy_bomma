<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fluxo · Projeto</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="/estilos.css" />
        <link rel="stylesheet" href="/projeto.css" />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    </head>
    <body>
        <main class="main main-solo">
            <header class="topbar">
                <div style="min-width:0;">
                    <div class="eyebrow" id="eyebrow">Projeto</div>
                    <h1 id="projNome">—</h1>
                    <p class="view-intro" id="projSub">Carregando dados do projeto…</p>
                </div>
                <div class="topbar-meta">
                    <div id="topMeta" style="display:flex; gap:9px; flex-wrap:wrap;"></div>
                    <a href="/" class="btn-refresh" style="text-decoration:none;">← Voltar ao dashboard</a>
                    <button class="btn-refresh" id="btnRefresh" title="Recarregar dados">↻ Atualizar</button>
                </div>
            </header>

            <div id="loading" class="state"><div class="spin"></div>Carregando o projeto…</div>
            <div id="error" class="state--error" hidden></div>

            <section id="content" hidden>

                <!-- Detalhes + Equipe -->
                <div class="two-col">
                    <div class="panel">
                        <div class="panel-head">
                            <span class="panel-title">Detalhes do projeto</span>
                            <span class="panel-sub">Cliente, prazos e categoria</span>
                        </div>
                        <div class="detail-grid" id="detailsGrid"></div>
                    </div>

                    <div class="panel">
                        <div class="panel-head">
                            <span class="panel-title">Equipe envolvida</span>
                            <span class="panel-sub" id="equipeCount"></span>
                        </div>
                        <div class="team-list" id="equipeList"></div>
                    </div>
                </div>

                <!-- Lista de status -->
                <div class="panel top-section">
                    <div class="panel-head">
                        <span class="panel-title">Linha do tempo de status</span>
                        <span class="panel-sub" id="statusCount"></span>
                    </div>
                    <div id="statusTimeline"></div>
                </div>

                <!-- Comentários -->
                <div class="panel">
                    <div class="panel-head">
                        <span class="panel-title">Comentários</span>
                        <span class="panel-sub" id="commentCount"></span>
                    </div>
                    <div class="comments-list" id="commentsList"></div>
                </div>

            </section>
        </main>
        <script src="/projeto.js"></script>
    </body>
</html>
